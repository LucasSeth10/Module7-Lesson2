<html>
    <body>
        <h2>Functions</h2>
        <p id="demo"></p>
        <script>
            function times(x,y) {
                return y*x;
            }
            function average(x,y) {
                return times(x,y)/3;
            }
            let result = average(10,30);
            document.getElementById("demo").innerHTML=result;
        </script>
    </body>
</html>
