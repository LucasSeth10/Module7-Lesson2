<html>
    <body>
        <h2>Array Method</h2>
        <p id="myjoin"></p>
        <p id="firstpop"></p>
        <p id="secondpop"></p>
        <script>
            var fruits=["Mangos","Potatos","Corn","Eggplant"];
            document.getElementById("myjoin").innerHTML=fruits.join("*");
            document.getElementById("firstpop").innerHTML=fruits;
            fruits.pop();
            document.getElementById("secondpop").innerHTML=fruits;
        </script>
    </body>
</html>
